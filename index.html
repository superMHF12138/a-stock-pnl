<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>持仓今日盈亏</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f5f5f7; color: #1d1d1f; padding: 20px; min-height: 100vh; }
  .container { max-width: 560px; margin: 40px auto 0; }
  .card { background: white; border-radius: 12px; padding: 28px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); margin-bottom: 16px; }
  .label { color: #888; font-size: 13px; margin-bottom: 10px; }
  .pnl { font-size: 56px; font-weight: 600; line-height: 1.1; font-variant-numeric: tabular-nums; letter-spacing: -1px; }
  .pnl-unit { font-size: 24px; font-weight: 500; margin-left: 4px; opacity: 0.7; }
  .meta { color: #999; font-size: 12px; margin-top: 14px; }
  .red { color: #ff4d4f; }
  .green { color: #00a86b; }

  .chart-card { padding: 22px 16px 14px; }
  .chart-header { display: flex; align-items: baseline; justify-content: space-between; padding: 0 8px 8px; }
  .chart-header .label { margin-bottom: 0; }
  .chart-tooltip { display: flex; gap: 10px; align-items: baseline; font-variant-numeric: tabular-nums; }
  .tt-time { color: #888; font-size: 12px; min-width: 40px; text-align: right; }
  .tt-value { font-size: 16px; font-weight: 600; min-width: 90px; text-align: right; }
  .chart { width: 100%; height: 200px; display: block; touch-action: pan-y; user-select: none; }
  .chart text { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }
  .chart-empty { display: flex; align-items: center; justify-content: center; height: 200px; color: #bbb; font-size: 13px; }

  .indices { padding: 20px 0 12px; }
  .indices .label { padding: 0 24px 4px; }
  .index-row { display: flex; align-items: baseline; padding: 10px 24px; gap: 12px; }
  .index-row + .index-row { border-top: 1px solid #f5f5f5; }
  .index-name { flex: 1; font-size: 14px; color: #333; font-weight: 500; }
  .index-price { font-size: 14px; font-variant-numeric: tabular-nums; color: #666; min-width: 80px; text-align: right; }
  .index-pct { font-size: 14px; font-variant-numeric: tabular-nums; min-width: 70px; text-align: right; font-weight: 600; }
  .footer { text-align: center; color: #bbb; font-size: 11px; margin-top: 8px; }

  @media (max-width: 600px) {
    body { padding: 12px; }
    .container { margin-top: 8px; }
    .card { padding: 20px; }
    .pnl { font-size: 42px; }
    .pnl-unit { font-size: 20px; }
    .chart-card { padding: 16px 8px 10px; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="card">
    <div class="label">持仓今日盈亏</div>
    <div class="pnl" id="pnl">--</div>
    <div class="meta" id="meta">加载中...</div>
  </div>

  <div class="card chart-card">
    <div class="chart-header">
      <span class="label">今日盈亏走势</span>
      <span class="chart-tooltip">
        <span class="tt-time" id="ttTime">--</span>
        <span class="tt-value" id="ttValue">--</span>
      </span>
    </div>
    <svg class="chart" id="chart" preserveAspectRatio="none" viewBox="0 0 600 200"></svg>
  </div>

  <div class="card indices">
    <div class="label">A股三大指数</div>
    <div id="indices"></div>
  </div>

  <div class="footer">行情来源：腾讯财经 · 仅供参考</div>
</div>
<script>
// === 持仓配置 ===
const STOCKS = [
  { code: '300223', shares: 500 },
  { code: '300456', shares: 3500 },
  { code: '300475', shares: 800 },
];

const INDICES = [
  { sym: 'sh000001', name: '上证指数' },
  { sym: 'sz399001', name: '深证成指' },
  { sym: 'sz399006', name: '创业板指' },
];

const SNAPSHOT_MS = 3000;
const HISTORY_MS = 30000;
// =================

function codeToSym(code) {
  const f = code[0];
  return ((f === '6' || f === '5' || f === '9') ? 'sh' : 'sz') + code;
}

function loadScript(url, charset) {
  return new Promise((resolve, reject) => {
    const script = document.createElement('script');
    if (charset) { try { script.charset = charset; } catch (e) {} }
    const timeout = setTimeout(() => { cleanup(); reject(new Error('timeout')); }, 8000);
    function cleanup() {
      clearTimeout(timeout);
      if (script.parentNode) script.parentNode.removeChild(script);
    }
    script.onload = () => { cleanup(); resolve(); };
    script.onerror = () => { cleanup(); reject(new Error('network')); };
    script.src = url;
    document.head.appendChild(script);
  });
}

async function fetchQuotes(symbols) {
  const result = {};
  if (symbols.length === 0) return result;
  for (const s of symbols) { try { window['v_' + s] = undefined; } catch (e) {} }
  await loadScript('https://qt.gtimg.cn/q=' + symbols.join(','), 'GBK');
  for (const s of symbols) {
    const raw = window['v_' + s];
    if (!raw || typeof raw !== 'string') continue;
    const parts = raw.split('~');
    const price = parseFloat(parts[3]);
    if (!(price > 0)) continue;
    result[s] = {
      name: parts[1] || '',
      price: price,
      prevClose: parseFloat(parts[4]) || 0,
      changePct: parseFloat(parts[32]) || 0,
    };
  }
  return result;
}

async function fetchMinuteData(sym) {
  // 主：腾讯 web JSON 接口
  const varName = '__min_' + sym.replace(/[^a-z0-9]/gi, '') + '_' + Date.now();
  try {
    await loadScript('https://web.ifzq.gtimg.cn/appstock/app/minute/query?code=' + sym + '&_var=' + varName);
    const obj = window[varName];
    try { delete window[varName]; } catch (e) { window[varName] = undefined; }
    if (obj && obj.code === 0 && obj.data && obj.data[sym] && obj.data[sym].data && Array.isArray(obj.data[sym].data.data)) {
      const points = [];
      for (const line of obj.data[sym].data.data) {
        const parts = String(line).split(/\s+/);
        if (parts.length >= 2 && /^\d{4}$/.test(parts[0])) {
          const p = parseFloat(parts[1]);
          if (p > 0) points.push({ time: parts[0], price: p });
        }
      }
      if (points.length > 0) return points;
    }
  } catch (e) {}

  // 备：旧版 flashdata
  const legacyVar = 'min_data_' + sym;
  try { window[legacyVar] = undefined; } catch (e) {}
  try {
    await loadScript('https://data.gtimg.cn/flashdata/hushen/minute/' + sym + '.js?_=' + Date.now(), 'GBK');
    const raw = window[legacyVar];
    if (raw && typeof raw === 'string') {
      const points = [];
      for (const line of raw.split(/\r?\n/)) {
        const m = line.match(/^(\d{4})\s+([\d.]+)/);
        if (m) points.push({ time: m[1], price: parseFloat(m[2]) });
      }
      if (points.length > 0) return points;
    }
  } catch (e) {}

  return null;
}

function fmt(n, d) {
  if (d == null) d = 2;
  if (!isFinite(n)) return '--';
  return n.toLocaleString('zh-CN', { minimumFractionDigits: d, maximumFractionDigits: d });
}
function signed(n, d) { return (n > 0 ? '+' : '') + fmt(n, d); }
function colorClass(n) { return n > 0 ? 'red' : (n < 0 ? 'green' : ''); }
function formatTime(t) { return t.substring(0, 2) + ':' + t.substring(2); }

let currentSnapshot = {};
let currentSeries = [];

async function refreshSnapshot() {
  const stockSyms = STOCKS.map(s => codeToSym(s.code));
  const indexSyms = INDICES.map(i => i.sym);
  let data = {};
  try { data = await fetchQuotes([...stockSyms, ...indexSyms]); } catch (e) {}
  currentSnapshot = data;

  let totalPnl = 0;
  let valid = 0;
  for (const s of STOCKS) {
    const d = data[codeToSym(s.code)];
    if (!d || !d.prevClose) continue;
    totalPnl += (d.price - d.prevClose) * s.shares;
    valid++;
  }
  const pnlEl = document.getElementById('pnl');
  if (valid === STOCKS.length) {
    pnlEl.innerHTML = '<span>' + signed(totalPnl) + '</span><span class="pnl-unit">元</span>';
    pnlEl.className = 'pnl ' + colorClass(totalPnl);
    setLatestTooltip(totalPnl);
  } else if (valid === 0) {
    pnlEl.textContent = '加载失败';
    pnlEl.className = 'pnl';
  } else {
    pnlEl.innerHTML = '<span>' + signed(totalPnl) + '</span><span class="pnl-unit">元 (部分)</span>';
    pnlEl.className = 'pnl ' + colorClass(totalPnl);
  }

  const idxEl = document.getElementById('indices');
  idxEl.innerHTML = '';
  for (const idx of INDICES) {
    const d = data[idx.sym];
    const row = document.createElement('div');
    row.className = 'index-row';
    if (d) {
      const cls = colorClass(d.changePct);
      row.innerHTML =
        '<span class="index-name">' + idx.name + '</span>' +
        '<span class="index-price ' + cls + '">' + fmt(d.price) + '</span>' +
        '<span class="index-pct ' + cls + '">' + signed(d.changePct) + '%</span>';
    } else {
      row.innerHTML =
        '<span class="index-name">' + idx.name + '</span>' +
        '<span class="index-price">--</span>' +
        '<span class="index-pct">--</span>';
    }
    idxEl.appendChild(row);
  }

  document.getElementById('meta').textContent =
    '已更新 ' + new Date().toLocaleTimeString('zh-CN', { hour12: false }) +
    ' · 现价每 ' + (SNAPSHOT_MS / 1000) + ' 秒、走势每 ' + (HISTORY_MS / 1000) + ' 秒刷新';
}

async function refreshHistory() {
  const minuteData = await Promise.all(STOCKS.map(s => fetchMinuteData(codeToSym(s.code)).catch(() => null)));
  const failedCodes = minuteData.map((d, i) => d ? null : STOCKS[i].code).filter(Boolean);
  if (failedCodes.length === STOCKS.length) {
    if (currentSeries.length === 0) renderChart([], '分钟数据接口无响应（可能是网络受限或非交易日）');
    return;
  }
  if (failedCodes.length > 0) {
    if (currentSeries.length === 0) renderChart([], '部分股票分钟数据缺失：' + failedCodes.join('、'));
    return;
  }
  const prevCloses = STOCKS.map(s => {
    const d = currentSnapshot[codeToSym(s.code)];
    return d ? d.prevClose : 0;
  });
  if (prevCloses.some(p => !p)) return;

  const priceByTime = minuteData.map(arr => {
    const m = {};
    for (const p of arr) m[p.time] = p.price;
    return m;
  });
  const allTimes = new Set();
  for (const arr of minuteData) for (const p of arr) allTimes.add(p.time);
  const sortedTimes = [...allTimes].sort();

  const lastPrice = STOCKS.map(() => null);
  const series = [];
  for (const t of sortedTimes) {
    for (let i = 0; i < STOCKS.length; i++) {
      if (priceByTime[i][t] != null) lastPrice[i] = priceByTime[i][t];
    }
    if (lastPrice.every(p => p !== null)) {
      let pnl = 0;
      for (let i = 0; i < STOCKS.length; i++) {
        pnl += (lastPrice[i] - prevCloses[i]) * STOCKS[i].shares;
      }
      series.push({ time: t, pnl });
    }
  }
  currentSeries = series;
  renderChart(series);
}

const chartGeom = { W: 600, H: 200, padL: 44, padR: 12, padT: 12, padB: 18 };

function renderChart(series, emptyMsg) {
  const svg = document.getElementById('chart');
  if (!series || series.length === 0) {
    const msg = emptyMsg || '暂无数据（非交易时段或市场未开盘）';
    svg.innerHTML = '<text x="300" y="100" text-anchor="middle" fill="#bbb" font-size="13">' + msg + '</text>';
    return;
  }
  const { W, H, padL, padR, padT, padB } = chartGeom;
  const innerW = W - padL - padR;
  const innerH = H - padT - padB;

  let yMin = Math.min(0, ...series.map(p => p.pnl));
  let yMax = Math.max(0, ...series.map(p => p.pnl));
  if (yMin === yMax) { yMin -= 1; yMax += 1; }
  const pad = (yMax - yMin) * 0.1;
  yMin -= pad; yMax += pad;

  const xScale = i => padL + (series.length === 1 ? innerW / 2 : (i / (series.length - 1)) * innerW);
  const yScale = v => padT + (1 - (v - yMin) / (yMax - yMin)) * innerH;

  const d = series.map((p, i) => (i === 0 ? 'M' : 'L') + xScale(i).toFixed(1) + ',' + yScale(p.pnl).toFixed(1)).join(' ');

  // 填充区域（更好看）
  const fillD = d + ' L' + xScale(series.length - 1).toFixed(1) + ',' + yScale(0).toFixed(1) +
                ' L' + xScale(0).toFixed(1) + ',' + yScale(0).toFixed(1) + ' Z';

  const lastPnl = series[series.length - 1].pnl;
  const stroke = lastPnl > 0 ? '#ff4d4f' : (lastPnl < 0 ? '#00a86b' : '#888');
  const fill = lastPnl > 0 ? 'rgba(255,77,79,0.08)' : (lastPnl < 0 ? 'rgba(0,168,107,0.08)' : 'rgba(136,136,136,0.05)');

  const zeroY = yScale(0);

  svg.innerHTML =
    '<line x1="' + padL + '" y1="' + padT + '" x2="' + padL + '" y2="' + (padT + innerH) + '" stroke="#eee"/>' +
    '<line x1="' + padL + '" y1="' + (padT + innerH) + '" x2="' + (W - padR) + '" y2="' + (padT + innerH) + '" stroke="#eee"/>' +
    '<line x1="' + padL + '" y1="' + zeroY + '" x2="' + (W - padR) + '" y2="' + zeroY + '" stroke="#ccc" stroke-dasharray="3,3"/>' +
    '<text x="' + (padL - 6) + '" y="' + (padT + 4) + '" text-anchor="end" fill="#aaa" font-size="10">' + signed(yMax, 0) + '</text>' +
    '<text x="' + (padL - 6) + '" y="' + (zeroY + 3) + '" text-anchor="end" fill="#aaa" font-size="10">0</text>' +
    '<text x="' + (padL - 6) + '" y="' + (padT + innerH) + '" text-anchor="end" fill="#aaa" font-size="10">' + signed(yMin, 0) + '</text>' +
    '<text x="' + padL + '" y="' + (H - 4) + '" text-anchor="start" fill="#aaa" font-size="10">' + formatTime(series[0].time) + '</text>' +
    '<text x="' + (W - padR) + '" y="' + (H - 4) + '" text-anchor="end" fill="#aaa" font-size="10">' + formatTime(series[series.length - 1].time) + '</text>' +
    '<path d="' + fillD + '" fill="' + fill + '" stroke="none"/>' +
    '<path d="' + d + '" fill="none" stroke="' + stroke + '" stroke-width="1.5" stroke-linejoin="round"/>' +
    '<line id="crosshair" x1="0" y1="' + padT + '" x2="0" y2="' + (padT + innerH) + '" stroke="#999" stroke-dasharray="2,2" visibility="hidden"/>' +
    '<circle id="dot" cx="0" cy="0" r="3.5" fill="#fff" stroke="' + stroke + '" stroke-width="2" visibility="hidden"/>';

  setLatestTooltip(lastPnl, series[series.length - 1].time);
}

function setLatestTooltip(pnl, time) {
  const ttv = document.getElementById('ttValue');
  const ttt = document.getElementById('ttTime');
  ttv.textContent = signed(pnl) + ' 元';
  ttv.className = 'tt-value ' + colorClass(pnl);
  ttt.textContent = time ? formatTime(time) : '现价';
}

function showTooltipAt(idx) {
  const series = currentSeries;
  if (!series || series.length === 0) return;
  idx = Math.max(0, Math.min(series.length - 1, idx));
  const p = series[idx];
  const { W, H, padL, padR, padT, padB } = chartGeom;
  const innerW = W - padL - padR;
  const innerH = H - padT - padB;

  let yMin = Math.min(0, ...series.map(p => p.pnl));
  let yMax = Math.max(0, ...series.map(p => p.pnl));
  if (yMin === yMax) { yMin -= 1; yMax += 1; }
  const pad = (yMax - yMin) * 0.1;
  yMin -= pad; yMax += pad;
  const xScale = i => padL + (series.length === 1 ? innerW / 2 : (i / (series.length - 1)) * innerW);
  const yScale = v => padT + (1 - (v - yMin) / (yMax - yMin)) * innerH;
  const cx = xScale(idx), cy = yScale(p.pnl);

  const ch = document.getElementById('crosshair');
  const dot = document.getElementById('dot');
  if (ch && dot) {
    ch.setAttribute('x1', cx); ch.setAttribute('x2', cx);
    ch.setAttribute('visibility', 'visible');
    dot.setAttribute('cx', cx); dot.setAttribute('cy', cy);
    dot.setAttribute('visibility', 'visible');
  }
  document.getElementById('ttTime').textContent = formatTime(p.time);
  const ttv = document.getElementById('ttValue');
  ttv.textContent = signed(p.pnl) + ' 元';
  ttv.className = 'tt-value ' + colorClass(p.pnl);
}

function clearTooltipMark() {
  const ch = document.getElementById('crosshair');
  const dot = document.getElementById('dot');
  if (ch) ch.setAttribute('visibility', 'hidden');
  if (dot) dot.setAttribute('visibility', 'hidden');
  // 恢复成"最新"
  if (currentSeries.length > 0) {
    const last = currentSeries[currentSeries.length - 1];
    setLatestTooltip(last.pnl, last.time);
  }
}

function setupChartInteraction() {
  const svg = document.getElementById('chart');
  function pickIndex(clientX) {
    const rect = svg.getBoundingClientRect();
    const ratio = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
    const { W, padL, padR } = chartGeom;
    const innerW = W - padL - padR;
    const x = ratio * W;
    const series = currentSeries;
    if (!series || series.length === 0) return -1;
    return Math.round(((x - padL) / innerW) * (series.length - 1));
  }
  svg.addEventListener('mousemove', e => { const i = pickIndex(e.clientX); if (i >= 0) showTooltipAt(i); });
  svg.addEventListener('mouseleave', clearTooltipMark);
  svg.addEventListener('touchstart', e => { if (e.touches[0]) { const i = pickIndex(e.touches[0].clientX); if (i >= 0) showTooltipAt(i); } }, { passive: true });
  svg.addEventListener('touchmove', e => { if (e.touches[0]) { const i = pickIndex(e.touches[0].clientX); if (i >= 0) showTooltipAt(i); } }, { passive: true });
  svg.addEventListener('touchend', clearTooltipMark);
}

setupChartInteraction();
refreshSnapshot().then(refreshHistory);
setInterval(refreshSnapshot, SNAPSHOT_MS);
setInterval(refreshHistory, HISTORY_MS);
</script>
</body>
</html>
