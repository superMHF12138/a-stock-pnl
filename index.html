<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>持仓今日盈亏</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f5f5f7; color: #1d1d1f; padding: 20px; min-height: 100vh; }
  .container { max-width: 560px; margin: 40px auto 0; }
  .card { background: white; border-radius: 12px; padding: 28px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); margin-bottom: 16px; }
  .label { color: #888; font-size: 13px; margin-bottom: 10px; }
  .pnl { font-size: 56px; font-weight: 600; line-height: 1.1; font-variant-numeric: tabular-nums; letter-spacing: -1px; }
  .pnl-unit { font-size: 24px; font-weight: 500; margin-left: 4px; opacity: 0.7; }
  .meta { color: #999; font-size: 12px; margin-top: 14px; }
  .red { color: #ff4d4f; }
  .green { color: #00a86b; }

  .chart-card { padding: 22px 16px 14px; }
  .chart-header { display: flex; align-items: baseline; justify-content: space-between; padding: 0 8px 8px; }
  .chart-header .label { margin-bottom: 0; }
  .chart-tooltip { display: flex; gap: 10px; align-items: baseline; font-variant-numeric: tabular-nums; }
  .tt-time { color: #888; font-size: 12px; min-width: 40px; text-align: right; }
  .tt-value { font-size: 16px; font-weight: 600; min-width: 90px; text-align: right; }
  .chart { width: 100%; height: 200px; display: block; touch-action: pan-y; user-select: none; }
  .chart text { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }

  .indices-card { padding: 18px 0 4px; }
  .indices-card .label { padding: 0 24px 4px; }
  .index-block { padding: 10px 18px 12px; border-top: 1px solid #f3f3f3; }
  .index-block:first-of-type { border-top: none; }
  .index-row { display: flex; align-items: baseline; justify-content: space-between; padding: 0 6px 4px; gap: 10px; }
  .index-name { font-size: 14px; color: #333; font-weight: 500; }
  .index-info { display: flex; gap: 10px; align-items: baseline; font-variant-numeric: tabular-nums; }
  .idx-tt-time { color: #aaa; font-size: 11px; min-width: 38px; text-align: right; }
  .idx-tt-price { color: #666; font-size: 13px; min-width: 70px; text-align: right; }
  .idx-tt-pct { font-size: 13px; font-weight: 600; min-width: 60px; text-align: right; }
  .mini-chart { width: 100%; height: 76px; display: block; touch-action: pan-y; user-select: none; }

  .footer { text-align: center; color: #bbb; font-size: 11px; margin-top: 8px; }

  @media (max-width: 600px) {
    body { padding: 12px; }
    .container { margin-top: 8px; }
    .card { padding: 20px; }
    .pnl { font-size: 42px; }
    .pnl-unit { font-size: 20px; }
    .chart-card { padding: 16px 8px 10px; }
    .indices-card { padding: 16px 0 4px; }
    .index-block { padding: 10px 8px; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="card">
    <div class="label">持仓今日盈亏</div>
    <div class="pnl" id="pnl">--</div>
    <div class="meta" id="meta">加载中...</div>
  </div>

  <div class="card chart-card">
    <div class="chart-header">
      <span class="label">今日盈亏走势</span>
      <span class="chart-tooltip">
        <span class="tt-time" id="ttTime">--</span>
        <span class="tt-value" id="ttValue">--</span>
      </span>
    </div>
    <svg class="chart" id="chart" preserveAspectRatio="none" viewBox="0 0 600 200"></svg>
  </div>

  <div class="card indices-card">
    <div class="label">A股三大指数</div>
    <div id="indices"></div>
  </div>

  <div class="footer">行情来源：腾讯财经 · 仅供参考</div>
</div>
<script>
// === 持仓配置 ===
const STOCKS = [
  { code: '300223', shares: 500 },
  { code: '300456', shares: 3500 },
  { code: '300475', shares: 800 },
];

const INDICES = [
  { sym: 'sh000001', name: '上证指数' },
  { sym: 'sz399001', name: '深证成指' },
  { sym: 'sz399006', name: '创业板指' },
];

const SNAPSHOT_MS = 3000;
const HISTORY_MS = 30000;
// =================

function codeToSym(code) {
  const f = code[0];
  return ((f === '6' || f === '5' || f === '9') ? 'sh' : 'sz') + code;
}

function loadScript(url, charset) {
  return new Promise((resolve, reject) => {
    const script = document.createElement('script');
    if (charset) { try { script.charset = charset; } catch (e) {} }
    const timeout = setTimeout(() => { cleanup(); reject(new Error('timeout')); }, 8000);
    function cleanup() {
      clearTimeout(timeout);
      if (script.parentNode) script.parentNode.removeChild(script);
    }
    script.onload = () => { cleanup(); resolve(); };
    script.onerror = () => { cleanup(); reject(new Error('network')); };
    script.src = url;
    document.head.appendChild(script);
  });
}

async function fetchQuotes(symbols) {
  const result = {};
  if (symbols.length === 0) return result;
  for (const s of symbols) { try { window['v_' + s] = undefined; } catch (e) {} }
  await loadScript('https://qt.gtimg.cn/q=' + symbols.join(','), 'GBK');
  for (const s of symbols) {
    const raw = window['v_' + s];
    if (!raw || typeof raw !== 'string') continue;
    const parts = raw.split('~');
    const price = parseFloat(parts[3]);
    if (!(price > 0)) continue;
    result[s] = {
      name: parts[1] || '',
      price: price,
      prevClose: parseFloat(parts[4]) || 0,
      changePct: parseFloat(parts[32]) || 0,
    };
  }
  return result;
}

async function fetchMinuteData(sym) {
  const varName = '__min_' + sym.replace(/[^a-z0-9]/gi, '') + '_' + Date.now();
  try {
    await loadScript('https://web.ifzq.gtimg.cn/appstock/app/minute/query?code=' + sym + '&_var=' + varName);
    const obj = window[varName];
    try { delete window[varName]; } catch (e) { window[varName] = undefined; }
    if (obj && obj.code === 0 && obj.data && obj.data[sym] && obj.data[sym].data && Array.isArray(obj.data[sym].data.data)) {
      const points = [];
      for (const line of obj.data[sym].data.data) {
        const parts = String(line).split(/\s+/);
        if (parts.length >= 2 && /^\d{4}$/.test(parts[0])) {
          const p = parseFloat(parts[1]);
          if (p > 0) points.push({ time: parts[0], value: p });
        }
      }
      if (points.length > 0) return points;
    }
  } catch (e) {}

  const legacyVar = 'min_data_' + sym;
  try { window[legacyVar] = undefined; } catch (e) {}
  try {
    await loadScript('https://data.gtimg.cn/flashdata/hushen/minute/' + sym + '.js?_=' + Date.now(), 'GBK');
    const raw = window[legacyVar];
    if (raw && typeof raw === 'string') {
      const points = [];
      for (const line of raw.split(/\r?\n/)) {
        const m = line.match(/^(\d{4})\s+([\d.]+)/);
        if (m) points.push({ time: m[1], value: parseFloat(m[2]) });
      }
      if (points.length > 0) return points;
    }
  } catch (e) {}
  return null;
}

function fmt(n, d) {
  if (d == null) d = 2;
  if (!isFinite(n)) return '--';
  return n.toLocaleString('zh-CN', { minimumFractionDigits: d, maximumFractionDigits: d });
}
function signed(n, d) { return (n > 0 ? '+' : '') + fmt(n, d); }
function colorClass(n) { return n > 0 ? 'red' : (n < 0 ? 'green' : ''); }
function formatTime(t) { return t.substring(0, 2) + ':' + t.substring(2); }

// ====== 通用图表工厂 ======
function createChart(svg, options) {
  const { padding, viewBoxW, viewBoxH, getBaseline, onShow, showAxes } = options;
  let series = [];
  let scales = null;
  let externalCurrent = null; // {value, time?} 来自快照的实时值

  function computeScales(s, baseline) {
    const innerW = viewBoxW - padding.l - padding.r;
    const innerH = viewBoxH - padding.t - padding.b;
    let yMin = Math.min(baseline, ...s.map(p => p.value));
    let yMax = Math.max(baseline, ...s.map(p => p.value));
    if (yMin === yMax) { yMin -= 1; yMax += 1; }
    const pad = (yMax - yMin) * 0.1;
    yMin -= pad; yMax += pad;
    return {
      innerW, innerH, yMin, yMax, baseline,
      xScale: i => padding.l + (s.length === 1 ? innerW / 2 : (i / (s.length - 1)) * innerW),
      yScale: v => padding.t + (1 - (v - yMin) / (yMax - yMin)) * innerH
    };
  }

  function render(newSeries, emptyMsg) {
    series = newSeries || [];
    const baseline = getBaseline();
    if (!series.length || baseline == null || !isFinite(baseline)) {
      svg.innerHTML = '<text x="' + (viewBoxW / 2) + '" y="' + (viewBoxH / 2) + '" text-anchor="middle" fill="#bbb" font-size="12">' + (emptyMsg || '暂无数据') + '</text>';
      return;
    }
    scales = computeScales(series, baseline);
    const lastVal = series[series.length - 1].value;
    const stroke = lastVal > baseline ? '#ff4d4f' : (lastVal < baseline ? '#00a86b' : '#888');
    const fill = lastVal > baseline ? 'rgba(255,77,79,0.08)' : (lastVal < baseline ? 'rgba(0,168,107,0.08)' : 'rgba(136,136,136,0.05)');
    const baselineY = scales.yScale(baseline);
    const d = series.map((p, i) => (i === 0 ? 'M' : 'L') + scales.xScale(i).toFixed(1) + ',' + scales.yScale(p.value).toFixed(1)).join(' ');
    const fillD = d + ' L' + scales.xScale(series.length - 1).toFixed(1) + ',' + baselineY.toFixed(1) +
                  ' L' + scales.xScale(0).toFixed(1) + ',' + baselineY.toFixed(1) + ' Z';

    let svgContent = '';
    if (showAxes) {
      const yMaxLabel = baseline === 0 ? signed(scales.yMax, 0) : fmt(scales.yMax, 0);
      const yMinLabel = baseline === 0 ? signed(scales.yMin, 0) : fmt(scales.yMin, 0);
      const baselineLabel = baseline === 0 ? '0' : fmt(baseline, 0);
      svgContent +=
        '<line x1="' + padding.l + '" y1="' + padding.t + '" x2="' + padding.l + '" y2="' + (padding.t + scales.innerH) + '" stroke="#eee"/>' +
        '<line x1="' + padding.l + '" y1="' + (padding.t + scales.innerH) + '" x2="' + (viewBoxW - padding.r) + '" y2="' + (padding.t + scales.innerH) + '" stroke="#eee"/>' +
        '<text x="' + (padding.l - 6) + '" y="' + (padding.t + 4) + '" text-anchor="end" fill="#aaa" font-size="10">' + yMaxLabel + '</text>' +
        '<text x="' + (padding.l - 6) + '" y="' + (baselineY + 3) + '" text-anchor="end" fill="#aaa" font-size="10">' + baselineLabel + '</text>' +
        '<text x="' + (padding.l - 6) + '" y="' + (padding.t + scales.innerH) + '" text-anchor="end" fill="#aaa" font-size="10">' + yMinLabel + '</text>' +
        '<text x="' + padding.l + '" y="' + (viewBoxH - 4) + '" text-anchor="start" fill="#aaa" font-size="10">' + formatTime(series[0].time) + '</text>' +
        '<text x="' + (viewBoxW - padding.r) + '" y="' + (viewBoxH - 4) + '" text-anchor="end" fill="#aaa" font-size="10">' + formatTime(series[series.length - 1].time) + '</text>';
    }
    svgContent +=
      '<line x1="' + padding.l + '" y1="' + baselineY + '" x2="' + (viewBoxW - padding.r) + '" y2="' + baselineY + '" stroke="#ccc" stroke-dasharray="3,3"/>' +
      '<path d="' + fillD + '" fill="' + fill + '" stroke="none"/>' +
      '<path d="' + d + '" fill="none" stroke="' + stroke + '" stroke-width="1.5" stroke-linejoin="round"/>' +
      '<line class="crosshair" x1="0" y1="' + padding.t + '" x2="0" y2="' + (padding.t + scales.innerH) + '" stroke="#999" stroke-dasharray="2,2" visibility="hidden"/>' +
      '<circle class="dot" cx="0" cy="0" r="3.5" fill="#fff" stroke="' + stroke + '" stroke-width="2" visibility="hidden"/>';

    svg.innerHTML = svgContent;
    showCurrent();
  }

  function showCurrent() {
    const ch = svg.querySelector('.crosshair');
    const dot = svg.querySelector('.dot');
    if (ch) ch.setAttribute('visibility', 'hidden');
    if (dot) dot.setAttribute('visibility', 'hidden');
    const baseline = getBaseline();
    let point = externalCurrent;
    if (!point && series.length) point = series[series.length - 1];
    onShow && onShow(point, baseline, false);
  }

  function showAt(idx) {
    if (!series.length || !scales) return;
    idx = Math.max(0, Math.min(series.length - 1, idx));
    const p = series[idx];
    const cx = scales.xScale(idx);
    const cy = scales.yScale(p.value);
    const ch = svg.querySelector('.crosshair');
    const dot = svg.querySelector('.dot');
    if (ch) {
      ch.setAttribute('x1', cx); ch.setAttribute('x2', cx);
      ch.setAttribute('visibility', 'visible');
    }
    if (dot) {
      dot.setAttribute('cx', cx); dot.setAttribute('cy', cy);
      dot.setAttribute('visibility', 'visible');
    }
    onShow && onShow(p, scales.baseline, true);
  }

  function setCurrent(value, time) {
    externalCurrent = (value != null && isFinite(value)) ? { value, time: time || null } : null;
    showCurrent();
  }

  function pickIndex(clientX) {
    const rect = svg.getBoundingClientRect();
    const ratio = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
    const x = ratio * viewBoxW;
    if (!series.length || !scales) return -1;
    return Math.round(((x - padding.l) / scales.innerW) * (series.length - 1));
  }
  svg.addEventListener('mousemove', e => { const i = pickIndex(e.clientX); if (i >= 0) showAt(i); });
  svg.addEventListener('mouseleave', showCurrent);
  svg.addEventListener('touchstart', e => { if (e.touches[0]) { const i = pickIndex(e.touches[0].clientX); if (i >= 0) showAt(i); } }, { passive: true });
  svg.addEventListener('touchmove', e => { if (e.touches[0]) { const i = pickIndex(e.touches[0].clientX); if (i >= 0) showAt(i); } }, { passive: true });
  svg.addEventListener('touchend', showCurrent);

  return { render, setCurrent };
}

// ====== 状态 + 图表实例 ======
let currentSnapshot = {};
let portfolioChart = null;
const indexCharts = {};

function initCharts() {
  // 持仓盈亏图
  portfolioChart = createChart(document.getElementById('chart'), {
    padding: { l: 44, r: 12, t: 12, b: 18 },
    viewBoxW: 600, viewBoxH: 200,
    showAxes: true,
    getBaseline: () => 0,
    onShow: (point, baseline, hover) => {
      const ttv = document.getElementById('ttValue');
      const ttt = document.getElementById('ttTime');
      if (!point) {
        ttt.textContent = '--';
        ttv.textContent = '--';
        ttv.className = 'tt-value';
        return;
      }
      ttt.textContent = hover && point.time ? formatTime(point.time) : '现价';
      ttv.textContent = signed(point.value) + ' 元';
      ttv.className = 'tt-value ' + colorClass(point.value);
    }
  });

  // 三大指数小图
  const container = document.getElementById('indices');
  container.innerHTML = '';
  for (const idx of INDICES) {
    const block = document.createElement('div');
    block.className = 'index-block';
    block.innerHTML =
      '<div class="index-row">' +
        '<span class="index-name">' + idx.name + '</span>' +
        '<span class="index-info">' +
          '<span class="idx-tt-time">--</span>' +
          '<span class="idx-tt-price">--</span>' +
          '<span class="idx-tt-pct">--</span>' +
        '</span>' +
      '</div>' +
      '<svg class="mini-chart" preserveAspectRatio="none" viewBox="0 0 600 90"></svg>';
    container.appendChild(block);

    const svg = block.querySelector('.mini-chart');
    const ttTime = block.querySelector('.idx-tt-time');
    const ttPrice = block.querySelector('.idx-tt-price');
    const ttPct = block.querySelector('.idx-tt-pct');

    indexCharts[idx.sym] = createChart(svg, {
      padding: { l: 6, r: 6, t: 8, b: 8 },
      viewBoxW: 600, viewBoxH: 90,
      showAxes: false,
      getBaseline: () => {
        const d = currentSnapshot[idx.sym];
        return d && d.prevClose ? d.prevClose : null;
      },
      onShow: (point, baseline, hover) => {
        if (!point || !baseline) {
          ttTime.textContent = '--';
          ttPrice.textContent = '--';
          ttPrice.className = 'idx-tt-price';
          ttPct.textContent = '--';
          ttPct.className = 'idx-tt-pct';
          return;
        }
        const diff = point.value - baseline;
        const pct = (diff / baseline) * 100;
        const cls = colorClass(diff);
        ttTime.textContent = hover && point.time ? formatTime(point.time) : '现价';
        ttPrice.textContent = fmt(point.value);
        ttPrice.className = 'idx-tt-price ' + cls;
        ttPct.textContent = signed(pct) + '%';
        ttPct.className = 'idx-tt-pct ' + cls;
      }
    });
  }
}

async function refreshSnapshot() {
  const stockSyms = STOCKS.map(s => codeToSym(s.code));
  const indexSyms = INDICES.map(i => i.sym);
  let data = {};
  try { data = await fetchQuotes([...stockSyms, ...indexSyms]); } catch (e) {}
  currentSnapshot = data;

  // 顶部大盈亏数字
  let totalPnl = 0;
  let valid = 0;
  for (const s of STOCKS) {
    const d = data[codeToSym(s.code)];
    if (!d || !d.prevClose) continue;
    totalPnl += (d.price - d.prevClose) * s.shares;
    valid++;
  }
  const pnlEl = document.getElementById('pnl');
  if (valid === STOCKS.length) {
    pnlEl.innerHTML = '<span>' + signed(totalPnl) + '</span><span class="pnl-unit">元</span>';
    pnlEl.className = 'pnl ' + colorClass(totalPnl);
    portfolioChart && portfolioChart.setCurrent(totalPnl);
  } else if (valid === 0) {
    pnlEl.textContent = '加载失败';
    pnlEl.className = 'pnl';
    portfolioChart && portfolioChart.setCurrent(null);
  } else {
    pnlEl.innerHTML = '<span>' + signed(totalPnl) + '</span><span class="pnl-unit">元 (部分)</span>';
    pnlEl.className = 'pnl ' + colorClass(totalPnl);
    portfolioChart && portfolioChart.setCurrent(totalPnl);
  }

  // 指数小图的"现价"
  for (const idx of INDICES) {
    const d = data[idx.sym];
    const chart = indexCharts[idx.sym];
    if (chart) chart.setCurrent(d ? d.price : null);
  }

  document.getElementById('meta').textContent =
    '已更新 ' + new Date().toLocaleTimeString('zh-CN', { hour12: false }) +
    ' · 现价每 ' + (SNAPSHOT_MS / 1000) + ' 秒、走势每 ' + (HISTORY_MS / 1000) + ' 秒刷新';
}

async function refreshHistory() {
  const stockSyms = STOCKS.map(s => codeToSym(s.code));
  const indexSyms = INDICES.map(i => i.sym);
  const allSyms = [...stockSyms, ...indexSyms];
  const allResults = await Promise.all(allSyms.map(s => fetchMinuteData(s).catch(() => null)));
  const stockData = allResults.slice(0, stockSyms.length);
  const indexData = allResults.slice(stockSyms.length);

  // 持仓盈亏序列
  const failedStocks = stockData.map((d, i) => d ? null : STOCKS[i].code).filter(Boolean);
  if (failedStocks.length === STOCKS.length) {
    portfolioChart && portfolioChart.render([], '分钟数据接口无响应（可能是网络受限或非交易日）');
  } else if (failedStocks.length > 0) {
    portfolioChart && portfolioChart.render([], '部分股票分钟数据缺失：' + failedStocks.join('、'));
  } else {
    const prevCloses = STOCKS.map(s => {
      const d = currentSnapshot[codeToSym(s.code)];
      return d ? d.prevClose : 0;
    });
    if (!prevCloses.some(p => !p)) {
      const priceByTime = stockData.map(arr => {
        const m = {};
        for (const p of arr) m[p.time] = p.value;
        return m;
      });
      const allTimes = new Set();
      for (const arr of stockData) for (const p of arr) allTimes.add(p.time);
      const sortedTimes = [...allTimes].sort();

      const lastPrice = STOCKS.map(() => null);
      const series = [];
      for (const t of sortedTimes) {
        for (let i = 0; i < STOCKS.length; i++) {
          if (priceByTime[i][t] != null) lastPrice[i] = priceByTime[i][t];
        }
        if (lastPrice.every(p => p !== null)) {
          let pnl = 0;
          for (let i = 0; i < STOCKS.length; i++) {
            pnl += (lastPrice[i] - prevCloses[i]) * STOCKS[i].shares;
          }
          series.push({ time: t, value: pnl });
        }
      }
      portfolioChart && portfolioChart.render(series);
    }
  }

  // 指数序列
  for (let i = 0; i < INDICES.length; i++) {
    const idx = INDICES[i];
    const data = indexData[i];
    const chart = indexCharts[idx.sym];
    if (!chart) continue;
    if (!data) {
      chart.render([], '暂无数据');
    } else {
      chart.render(data);
    }
  }
}

initCharts();
refreshSnapshot().then(refreshHistory);
setInterval(refreshSnapshot, SNAPSHOT_MS);
setInterval(refreshHistory, HISTORY_MS);
</script>
</body>
</html>
